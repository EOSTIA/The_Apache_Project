# Server
server.port=8080
spring.application.name=streamsync-config-server

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# AES Encryption Key (Base64-encoded 128-bit key — change in production)
streamsync.encryption.key=U3RyZWFtU3luY0tleTE2Qg==

# SVN
streamsync.svn.repo-path=/tmp/streamsync-svn-repo
streamsync.svn.working-copy=/tmp/streamsync-svn-wc

# Security — disable default Spring Security for demo; replace with proper auth in prod
spring.security.user.name=admin
spring.security.user.password=streamsync123

# Logging
logging.level.com.streamsync=DEBUG
logging.level.org.springframework.kafka=WARN
