# StreamSync — Apache HTTP Server Configuration
# Place this file at: /etc/apache2/sites-available/streamsync.conf (Ubuntu)
# or: /etc/httpd/conf.d/streamsync.conf (CentOS/RHEL)
#
# Enable with: a2ensite streamsync && a2enmod proxy proxy_http ssl headers
# Reload with: systemctl reload apache2

# ──────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect
# All port 80 traffic is permanently redirected to port 443.
# This is TLS termination at the Apache layer.
# ──────────────────────────────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName streamsync.local
    Redirect permanent / https://streamsync.local/
</VirtualHost>

# ──────────────────────────────────────────────────────────────────────────────
# HTTPS VirtualHost — main StreamSync gateway
# ──────────────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName streamsync.local
    DocumentRoot /var/www/streamsync

    # ── TLS Configuration ──────────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile    /etc/ssl/streamsync/server.crt
    SSLCertificateKeyFile /etc/ssl/streamsync/server.key

    # Modern TLS: TLS 1.2 minimum, prefer TLS 1.3
    SSLProtocol           -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite        ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder   off
    SSLSessionTickets     off

    # ── Security Headers ────────────────────────────────────────────────────
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options    "nosniff"
    Header always set X-Frame-Options           "DENY"
    Header always set X-XSS-Protection         "1; mode=block"

    # ── Static Dashboard ────────────────────────────────────────────────────
    # Serves the admin HTML/JS dashboard from /var/www/streamsync/
    <Directory /var/www/streamsync>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # ── Reverse Proxy: Config Server (Tomcat on :8080) ─────────────────────
    # /api/* → Tomcat Config Server
    # mod_proxy_http forwards the request; ProxyPassReverse rewrites Location headers
    ProxyPreserveHost On
    ProxyPass        /api/ http://localhost:8080/api/
    ProxyPassReverse /api/ http://localhost:8080/api/

    # ── Reverse Proxy: Microservices ───────────────────────────────────────
    # /service/payments/* → Payments microservice (:8081)
    # /service/auth/*     → Auth microservice (:8082)
    # /service/inventory/* → Inventory microservice (:8083)
    ProxyPass        /service/payments/ http://localhost:8081/payments/
    ProxyPassReverse /service/payments/ http://localhost:8081/payments/

    ProxyPass        /service/auth/ http://localhost:8082/auth/
    ProxyPassReverse /service/auth/ http://localhost:8082/auth/

    ProxyPass        /service/inventory/ http://localhost:8083/inventory/
    ProxyPassReverse /service/inventory/ http://localhost:8083/inventory/

    # ── Rate Limiting (optional — requires mod_ratelimit) ──────────────────
    # Protects the /api/config PUT endpoint from being spammed
    <Location /api/config>
        SetOutputFilter RATE_LIMIT
        SetEnv rate-limit 400
    </Location>

    # ── Logging ─────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/streamsync-error.log
    CustomLog ${APACHE_LOG_DIR}/streamsync-access.log combined
</VirtualHost>
